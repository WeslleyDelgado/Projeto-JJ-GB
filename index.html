<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gracie Barra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#083e76">
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <img src="imagens/logo.png" alt="Gracie Barra Logo">
        </div>

        <form id="login-form" class="login-form">
            <div class="input-group">
                <input type="email" id="login-email" placeholder="E-mail" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-senha" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn-login-main">Entrar</button>
        </form>

        <div class="divider">ou</div>

        <div class="auth-buttons">
            <button class="btn google" onclick="socialLogin('Google')">
                <i class="fab fa-google"></i> Entrar com o Google
            </button>
            <button class="btn apple" onclick="socialLogin('Apple')">
                <i class="fab fa-apple"></i> Entrar com a Apple
            </button>
        </div>

        <p class="signup-text">Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
        <p class="signup-text" style="margin-top: 15px; font-size: 13px;"><a href="admin-login.html" style="color: #718096;"><i class="fa-solid fa-lock"></i> Acesso Restrito (Admin)</a></p>
    </div>

    <script src="config.js"></script>
    <script src="script-login.js"></script>
</body>
</html>
