<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno - Scanner</title>
    <link rel="stylesheet" href="style-principal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c53030">
</head>
<body>

    <div class="app-container">
        <header class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h1 style="margin-top: 0; font-size: 24px; color: var(--cor-secundaria);">Olá, <br><span class="user-name" style="font-size: 28px;">[Aluno]</span></h1>
                <span id="header-faixa" class="badge-faixa" style="display: none;"></span>
            </div>
            <img id="header-foto-perfil" src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" alt="Perfil" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--cor-primaria); box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        </header>

        <main class="scanner-section">
            <div class="scanner-box">
                <p id="status" style="color: #4a5568; font-weight: 600;">Aponte para o<br>QR Code da aula</p>
                
                <div class="scanner-frame">
                    <div id="reader"></div>
                </div>

                <div id="result-message" style="display:none; margin: 15px; color: #276749; font-weight: bold; padding: 12px 20px; background: #e6fffa; border-radius: 12px; border: 1px solid #b2f5ea;">
                    <i class="fa-solid fa-circle-check"></i> Presença Confirmada!
                </div>

                <button id="btn-scan" class="btn-capture" onclick="startScanner()">
                    <i class="fa-solid fa-qrcode" style="margin-right: 8px;"></i> Iniciar Captura
                </button>

                <button id="btn-simulate" class="btn-ghost" onclick="simulateScan()">
                    <i class="fa-solid fa-laptop"></i> Simular (Sem Câmera)
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="principal.html" class="nav-item active">
                <i class="fa-solid fa-camera"></i>
                <span>QR Code</span>
            </a>
            <a href="agendar.html" class="nav-item">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Agendar</span>
            </a>
            <a href="historico.html" class="nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Histórico</span>
            </a>
            <a href="evolucao.html" class="nav-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>Evolução</span>
            </a>
            <a href="conta.html" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Conta</span>
            </a>
        </nav>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
