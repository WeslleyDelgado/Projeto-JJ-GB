<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno - Scanner</title>
    <link rel="stylesheet" href="style-principal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#083e76">
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>Olá, <span class="user-name">[Aluno]</span></h1>
        </header>

        <main class="scanner-section">
            <div class="scanner-box">
                <p id="status">Aponte para o<br>QR Code da aula</p>
                
                <div id="reader"></div>

                <div id="result-message" style="display:none; margin: 15px; color: #276749; font-weight: bold;">
                    <i class="fa-solid fa-circle-check"></i> Presença Confirmada!
                </div>

                <button id="btn-scan" class="btn-capture" onclick="startScanner()">
                    Iniciar Captura
                </button>

                <button id="btn-simulate" class="btn-capture" style="background-color: #4a5568; margin-top: 10px;" onclick="simulateScan()">
                    <i class="fa-solid fa-laptop"></i> Simular (Sem Câmera)
                </button>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="principal.html" class="nav-item active">
                <i class="fa-solid fa-camera"></i>
                <span>QR Code</span>
            </a>
            <a href="historico.html" class="nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Histórico</span>
            </a>
            <a href="conta.html" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Conta</span>
            </a>
        </nav>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
