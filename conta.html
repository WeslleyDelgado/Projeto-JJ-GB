<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta</title>
    <link rel="stylesheet" href="style-principal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#083e76">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Minha <span class="user-name">Conta</span></h1>
            <p style="color: #718096; font-size: 14px;">Seus dados de perfil</p>
        </header>

        <main class="content-section" style="padding-top: 10px;">
            <form id="form-atualizar" style="width: 100%; display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                
                <div style="display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 10px;">
                    <img id="img-perfil" src="https://cdn.pixabay.com/photo/2015/10/05/22/37/blank-profile-picture-973460_1280.png" alt="Foto de Perfil" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #276749;">
                    <span id="conta-faixa" class="badge-faixa" style="display: none; margin-top: -5px; margin-bottom: 5px;"></span>
                    <label for="input-foto" style="background-color: #2c5282; color: white; padding: 8px 15px; border-radius: 20px; font-size: 12px; cursor: pointer;">
                        <i class="fa-solid fa-camera"></i> Alterar Foto
                    </label>
                    <input type="file" id="input-foto" accept="image/*" style="display: none;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: bold; color: #333; font-size: 14px;">Nome Completo</label>
                    <input type="text" id="edit-nome" class="input-modern" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: bold; color: #333; font-size: 14px;">E-mail (Não editável)</label>
                    <input type="email" id="edit-email" class="input-modern" readonly>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label style="font-weight: bold; color: #333; font-size: 14px;">Unidade</label>
                    <select id="edit-unidade" class="input-modern" required>
                        <option value="cascatinha">Cascatinha</option>
                        <option value="benfica">Benfica</option>
                        <option value="centro">Centro</option>
                    </select>
                </div>
                
                <div class="password-section">
                    <p style="font-size: 14px; font-weight: bold; color: #4a5568; margin-bottom: -5px;"><i class="fa-solid fa-lock" style="color: #a0aec0; margin-right: 5px;"></i> Alterar Senha</p>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-weight: bold; color: #333; font-size: 13px;">Senha Atual</label>
                        <input type="password" id="edit-senha-atual" class="input-modern" placeholder="Sua senha atual">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-weight: bold; color: #333; font-size: 13px;">Nova Senha</label>
                        <input type="password" id="edit-nova-senha" class="input-modern" placeholder="Sua nova senha">
                    </div>
                </div>
                
                <button type="submit" id="btn-salvar" class="btn-capture" style="width: 100%; margin-top: 10px; background-color: #276749; padding: 12px;">
                    <i class="fa-solid fa-floppy-disk"></i> Salvar Alterações
                </button>
            </form>
            
            <button id="btn-logout" class="btn-outline-danger" style="width: 100%; margin-top: 30px;">
                <i class="fa-solid fa-right-from-bracket"></i> Sair da Conta
            </button>
        </main>

        <nav class="bottom-nav">
            <a href="principal.html" class="nav-item">
                <i class="fa-solid fa-camera"></i>
                <span>QR Code</span>
            </a>
            <a href="agendar.html" class="nav-item">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Agendar</span>
            </a>
            <a href="historico.html" class="nav-item">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Histórico</span>
            </a>
            <a href="evolucao.html" class="nav-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>Evolução</span>
            </a>
            <a href="conta.html" class="nav-item active">
                <i class="fa-solid fa-user"></i>
                <span>Conta</span>
            </a>
        </nav>
    </div>

    <script src="config.js"></script>
    <script src="script-conta.js"></script>
</body>
</html>
