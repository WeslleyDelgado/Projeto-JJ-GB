<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gracie Barra</title>
    <link rel="stylesheet" href="style-cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#083e76">
    <style>
        .error-message {
            color: #c53030;
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none; /* Escondido por padrão */
            font-weight: 500;
        }
        .input-error { border-color: #c53030 !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>Criar Conta</h1>
            <p>Preencha os dados abaixo para começar.</p>
        </header>

        <main class="form-section">
            <form id="form-cadastro" novalidate>
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="cad-nome" placeholder="Ex: Carlos Gracie" required>
                    <div id="err-nome" class="error-message">Por favor, insira seu nome completo.</div>
                </div>

                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="cad-email" placeholder="seu@email.com" required>
                    <div id="err-email" class="error-message">Por favor, insira um e-mail válido.</div>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="cad-senha" placeholder="No mínimo 6 caracteres" required>
                    <div id="err-senha" class="error-message">A senha deve ter pelo menos 6 caracteres.</div>
                </div>

                <div class="input-group">
                    <label>Unidade (Escola)</label>
                    <select id="cad-unidade" required>
                        <option value="">Selecione sua unidade</option>
                        <option value="cascatinha">Cascatinha</option>
                        <option value="benfica">Benfica</option>
                        <option value="centro">Centro</option>
                    </select>
                    <div id="err-unidade" class="error-message">Por favor, selecione sua unidade.</div>
                </div>

                <button type="submit" class="btn-primary">Finalizar Cadastro</button>
            </form>
        </main>

        <footer class="footer-text">
            Já possui uma conta? <a href="index.html">Faça Login</a>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script-cadastro.js"></script>
</body>
</html>
