<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Presenças</title>
    <link rel="stylesheet" href="style-principal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#083e76">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Meu <span class="user-name">Histórico</span></h1>
            <p style="color: #718096; font-size: 14px;">Suas últimas aulas registradas</p>
        </header>

        <main class="content-section">
            <div id="lista-historico" class="historico-container">
                <!-- Simulação de lista de presenças -->
                <div class="card-presenca" style="animation-delay: 0.1s">
                    <div class="card-icon">
                        <i class="fa-solid fa-circle-check" style="color: #276749; font-size: 24px;"></i>
                    </div>
                    <div class="card-info">
                        <h3>Aula de Jiu-Jitsu (No-Gi)</h3>
                        <p><i class="fa-regular fa-clock"></i> 25/10/2023 - 19:30</p>
                    </div>
                </div>
                <div class="card-presenca" style="animation-delay: 0.2s">
                    <div class="card-icon">
                        <i class="fa-solid fa-circle-check" style="color: #276749; font-size: 24px;"></i>
                    </div>
                    <div class="card-info">
                        <h3>Aula de Jiu-Jitsu (Iniciantes)</h3>
                        <p><i class="fa-regular fa-clock"></i> 24/10/2023 - 18:00</p>
                    </div>
                </div>
                <div class="card-presenca" style="animation-delay: 0.3s">
                    <div class="card-icon">
                        <i class="fa-solid fa-circle-check" style="color: #276749; font-size: 24px;"></i>
                    </div>
                    <div class="card-info">
                        <h3>Aula de Jiu-Jitsu (Avançado)</h3>
                        <p><i class="fa-regular fa-clock"></i> 22/10/2023 - 20:00</p>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="principal.html" class="nav-item">
                <i class="fa-solid fa-camera"></i>
                <span>QR Code</span>
            </a>
            <a href="historico.html" class="nav-item active">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Histórico</span>
            </a>
            <a href="conta.html" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Conta</span>
            </a>
        </nav>
    </div>

    <script src="config.js"></script>
    <script src="script-historico.js"></script>
</body>
</html>
