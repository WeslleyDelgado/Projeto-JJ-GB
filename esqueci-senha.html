<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Gracie Barra</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#083e76">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="imagens/logo.png" alt="Gracie Barra Logo">
        </div>

        <h2 style="margin-bottom: 10px; font-size: 22px; color: #333;">Recuperar Senha</h2>
        <p style="color: #718096; font-size: 14px; margin-bottom: 20px;">
            Para garantir a segurança da sua conta, a redefinição de senha é feita diretamente com a secretaria.
        </p>
        
        <div style="background-color: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 25px; text-align: left;">
            <p style="color: #4a5568; font-size: 14px; margin-bottom: 10px;"><i class="fa-solid fa-circle-info" style="color: #c53030;"></i> <strong>O que fazer?</strong></p>
            <p style="color: #718096; font-size: 14px;">Mande uma mensagem ou fale com o administrador da sua unidade Gracie Barra para receber sua senha temporária de acesso.</p>
        </div>

        <p class="signup-text" style="margin-top: 25px;">
            <a href="index.html" style="color: #718096;"><i class="fa-solid fa-arrow-left"></i> Voltar para o Login</a>
        </p>
    </div>
</body>
</html>
