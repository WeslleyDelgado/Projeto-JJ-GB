<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos - Admin Gracie Barra</title>
    <link rel="stylesheet" href="style-principal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #f4f4f4; display: block; height: auto; }
        .admin-container { max-width: 900px; margin: 40px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-section { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .input-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .input-col { flex: 1; min-width: 200px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #4a5568; }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #cbd5e0; font-size: 14px; outline: none; }
        .btn-submit { background-color: #c53030; color: white; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #c53030; color: white; }
        .badge { background: #e2e8f0; padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .btn-delete { background: transparent; color: #c53030; border: 1px solid #c53030; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .btn-delete:hover { background: #c53030; color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <header style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <button id="btn-sair-admin" style="background: none; border: none; color: #c53030; font-size: 24px; cursor: pointer; padding: 0;" title="Sair do Painel"><i class="fa-solid fa-right-from-bracket"></i></button>
            <div>
                <h1 style="margin: 0; color: #333; font-size: 24px;">Painel <span class="user-name">Administrativo</span></h1>
                <p style="color: #718096; font-size: 14px; margin: 0;">Gestão da Grade de Aulas (Agendamento)</p>
            </div>
        </header>

        <div style="display: flex; gap: 10px; margin-bottom: 30px;">
            <a href="admin.html" style="flex: 1; text-align: center; background-color: #e2e8f0; color: #2d3748; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold;">Histórico</a>
            <a href="admin-alunos.html" style="flex: 1; text-align: center; background-color: #e2e8f0; color: #2d3748; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold;">Alunos</a>
            <a href="admin-aula.html" style="flex: 1; text-align: center; background-color: #e2e8f0; color: #2d3748; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold;">Gerar Aula</a>
            <a href="admin-agendamento.html" style="flex: 1; text-align: center; background-color: #c53030; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold;">Agenda</a>
        </div>

        <!-- Formulário de Criação -->
        <div class="form-section">
            <h2 style="color: #2d3748; margin-bottom: 15px; font-size: 18px;"><i class="fa-solid fa-plus-circle" style="color: #c53030;"></i> Cadastrar Nova Aula</h2>
            <form id="form-aula">
                <div class="input-row">
                    <div class="input-col">
                        <label>Título / Tipo da Aula</label>
                        <select id="aula-titulo" required>
                            <option value="Jiu-Jitsu Iniciantes">Jiu-Jitsu Iniciantes (GB1)</option>
                            <option value="Jiu-Jitsu Avançado">Jiu-Jitsu Avançado (GB2/GB3)</option>
                            <option value="Jiu-Jitsu Kids">Jiu-Jitsu Kids</option>
                            <option value="No-Gi (Sem Kimono)">No-Gi (Sem Kimono)</option>
                            <option value="Defesa Pessoal">Defesa Pessoal</option>
                            <option value="Open Mat">Open Mat</option>
                        </select>
                    </div>
                    <div class="input-col">
                        <label>Data e Hora</label>
                        <input type="datetime-local" id="aula-data" required>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-col">
                        <label>Unidade</label>
                        <select id="aula-unidade" required>
                            <option value="gb-matriz">Gracie Barra Centro</option>
                            <option value="gb-local">Gracie Barra Rio</option>
                        </select>
                    </div>
                    <div class="input-col">
                        <label>Limite de Vagas</label>
                        <input type="number" id="aula-vagas" min="1" max="100" value="30" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="btn-salvar-aula">Adicionar à Grade</button>
            </form>
        </div>

        <!-- Tabela de Aulas -->
        <h2 style="color: #2d3748; margin-bottom: 15px; font-size: 18px;"><i class="fa-solid fa-list" style="color: #c53030;"></i> Aulas Programadas</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Data e Hora</th>
                        <th>Turma</th>
                        <th>Unidade</th>
                        <th>Ocupação</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-aulas">
                    <!-- JS Injeta os Dados -->
                </tbody>
            </table>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="script-admin-agendamento.js"></script>
</body>
</html>
